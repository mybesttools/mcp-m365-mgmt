{% extends "_base.html" %}
{% block heading %}New agent client secret{% endblock %}
{% block content %}
<style>
  .field { margin-bottom: 1.25rem; }
  .tool-list {
    display: grid; grid-template-columns: 1fr 1fr; grid-auto-flow: row;
    gap: 0.2rem 1.5rem; margin-top: 0.5rem;
    max-height: 320px; overflow-y: auto; padding: 1rem;
    background: var(--primary-lighter); border: 1px solid var(--border); border-radius: 8px;
  }
  .tool-list label {
    display: flex; align-items: center; gap: 0.5rem; font-weight: normal;
    font-size: 0.9rem; padding: 0.2rem 0;
  }
  .hint { color: var(--muted); font-size: 0.85rem; margin: 0.35rem 0 0; }
  fieldset { border: none; padding: 0; margin: 0; }
  legend { font-weight: 600; font-size: 0.9rem; padding: 0; }
</style>
<div class="card">
  <form method="post" action="/admin/secrets">
    <div class="field">
      <label for="label">Label</label><br>
      <input id="label" name="label" type="text" placeholder="e.g. helpdesk-agent" required>
    </div>

    <fieldset class="field">
      <legend>Allowed tools</legend>
      <p class="hint">Leave all unchecked to grant access to every tool.</p>
      <div class="tool-list">
        {% for tool in tools %}
        <label><input type="checkbox" name="scopes" value="{{ tool }}"> {{ tool }}</label>
        {% endfor %}
      </div>
    </fieldset>

    <button type="submit">Create secret</button>
  </form>
</div>
<p style="margin-top:1rem"><a href="/admin">&larr; back to list</a></p>
{% endblock %}
