{% extends "_base.html" %}
{% block heading %}New agent client secret{% endblock %}
{% block content %}
<style>
  .tool-list { column-count: 2; margin: 0.5rem 0 1rem; }
  .tool-list label { display: block; font-weight: normal; }
</style>
<form method="post" action="/admin/secrets">
  <label for="label">Label</label><br>
  <input id="label" name="label" type="text" placeholder="e.g. helpdesk-agent" required>

  <p><strong>Allowed tools</strong> — leave all unchecked for full access to every tool.</p>
  <div class="tool-list">
    {% for tool in tools %}
    <label><input type="checkbox" name="scopes" value="{{ tool }}"> {{ tool }}</label>
    {% endfor %}
  </div>

  <button type="submit">Create</button>
</form>
<p><a href="/admin">&larr; back to list</a></p>
{% endblock %}
