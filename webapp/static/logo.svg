<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2 -3 92 100" width="92" height="100">
  <defs>
    <linearGradient id="bodyGrad" x1="20" y1="30" x2="85" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2f9ce6"/>
      <stop offset="0.5" stop-color="#1266c2"/>
      <stop offset="1" stop-color="#0b4d99"/>
    </linearGradient>
    <linearGradient id="lightGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9fe3ff"/>
      <stop offset="1" stop-color="#2fa0dd"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3f8fd8"/>
      <stop offset="1" stop-color="#0a3f88"/>
    </linearGradient>
  </defs>

  <!-- scissors (behind body) -->
  <g stroke="#0b3d73" stroke-width="1" stroke-linejoin="round">
    <path d="M 30,52 L 4,34 C 2.6,33 3.2,31.4 4.8,31.8 L 33,48 Z" fill="url(#lightGrad)"/>
    <path d="M 30,56 L 6,68 C 4.5,68.7 3.5,67.2 4.8,66.2 L 32,52.2 Z" fill="url(#lightGrad)"/>
    <circle cx="31" cy="54" r="2.4" fill="#2a86c8" stroke="#0b3d73" stroke-width="0.8"/>
  </g>

  <!-- corkscrew -->
  <path d="M 76,60 C 82,62 82,68 76,69 C 71,70 71,75 76,76 C 81,77 81,82 76,83 C 72,84 72,88 76,90"
        fill="none" stroke="url(#darkGrad)" stroke-width="3.4" stroke-linecap="round"/>
  <path d="M 76,60 C 82,62 82,68 76,69 C 71,70 71,75 76,76 C 81,77 81,82 76,83 C 72,84 72,88 76,90"
        fill="none" stroke="#0b3d73" stroke-width="0.9" stroke-linecap="round"/>

  <!-- small blade -->
  <g stroke="#0b3d73" stroke-width="1" stroke-linejoin="round">
    <path d="M 62,58 C 64,57 66,57.6 66.4,59 L 60,85 C 59.6,86.6 57.6,86.2 57.6,84.6 Z" fill="url(#darkGrad)"/>
    <circle cx="61" cy="70" r="0.9" fill="#0b3d73"/>
  </g>

  <!-- hook / can-opener tool -->
  <g stroke="#0b3d73" stroke-width="1" stroke-linejoin="round">
    <path d="M 63,25 L 80,3 C 82,0.4 86,2.6 84.4,5.6 C 83.4,7.4 81.6,7.6 80.6,6 L 67,29 Z"
          fill="url(#lightGrad)"/>
  </g>

  <!-- main blade -->
  <g stroke="#0b3d73" stroke-width="1" stroke-linejoin="round">
    <path d="M 65,26 L 12,11 C 10,10.4 10,9 12,9.2 L 38,15.5 L 42,13.5 L 45,14.8 L 42,17 L 69,22 Z"
          fill="url(#lightGrad)"/>
  </g>

  <!-- body / handle -->
  <g>
    <path d="M 22,88 C 18,88 15,85 16,81 L 63,26 C 66,23 70,23 73,26 L 81,34 C 84,37 84,41 81,44 L 33,86 C 30,89 25,89 22,88 Z"
          fill="url(#bodyGrad)" stroke="#0a3564" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M 24,84 L 69,32" stroke="#5fb6ee" stroke-width="1" opacity="0.6" fill="none" stroke-linecap="round"/>
  </g>

  <!-- keyring loop -->
  <g stroke="#0a3564" stroke-width="1.4">
    <ellipse cx="17" cy="90" rx="3.6" ry="4.6" fill="none" transform="rotate(-15 17 90)"/>
  </g>

  <!-- emblem -->
  <g transform="translate(62,42) rotate(-42)">
    <rect x="-6" y="-6" width="12" height="12" rx="2" fill="#eef6ff" stroke="#0a3564" stroke-width="0.8"/>
    <rect x="-1" y="-4.2" width="2" height="8.4" fill="#1266c2"/>
    <rect x="-4.2" y="-1" width="8.4" height="2" fill="#1266c2"/>
  </g>
</svg>
