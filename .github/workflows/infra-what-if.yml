name: Infra what-if

on:
  pull_request:
    paths:
      - "infra/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  what-if:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-if
        id: whatif
        run: |
          OUTPUT=$(az deployment group what-if \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters infra/main.parameters.json \
            --parameters adminAadClientId="${{ secrets.ADMIN_AAD_CLIENT_ID }}" secretPepper="${{ secrets.SECRET_PEPPER }}" adminAadClientSecret="${{ secrets.ADMIN_AAD_CLIENT_SECRET }}" \
            --no-pretty-print)
          {
            echo "result<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment what-if result on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = "### Bicep what-if\n```\n" + `${{ steps.whatif.outputs.result }}`.slice(0, 60000) + "\n```";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
