name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio

      - name: Lint
        # Scoped to code this repo's Azure-hosting work owns. mcp_m365_mgmt.py
        # predates it and has its own pre-existing lint debt (bare except,
        # a couple unused imports) that isn't this PR's to fix.
        run: ruff check webapp/ tests/

      - name: Sanity import (stdio server + web app compose cleanly)
        env:
          STORAGE_ACCOUNT_NAME: sanity-check-placeholder
          SECRET_PEPPER: sanity-check-placeholder
        run: |
          python -c "import mcp_m365_mgmt"
          python -c "import webapp.asgi"

      - name: Run tests
        run: pytest -v
