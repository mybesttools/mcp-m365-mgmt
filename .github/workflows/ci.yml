name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio

      - name: Lint
        run: ruff check .

      - name: Sanity import (stdio server + web app compose cleanly)
        run: |
          python -c "import mcp_m365_mgmt"
          python -c "import webapp.asgi"

      - name: Run tests
        run: pytest -v
